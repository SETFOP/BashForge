name: Build BashForge

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Show Go Version
        run: go version

      - name: Download Dependencies
        run: go mod tidy

      - name: Build Project
        run: go build .
